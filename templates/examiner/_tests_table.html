<div class="card shadow-sm border-0">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Название</th><th>Статус</th><th>Видимость</th><th>Вопросы</th><th>Действия</th></tr></thead>
                <tbody>
                {% for test in tests %}
                    <tr>
                        <td>{{ test.title }}<div class="small text-secondary">{{ test.description or "Без описания" }}</div></td>
                        <td><span class="badge text-bg-dark">{{ test.status|enum_label }}</span></td>
                        <td>{{ test.visibility|enum_label }}</td>
                        <td>{{ test.questions|length }}</td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-dark" href="/tests/{{ test.id }}/edit">Открыть</a>
                            <form action="/reports/test/{{ test.id }}" method="post">
                                <button class="btn btn-sm btn-outline-secondary" type="submit">PDF</button>
                            </form>
                            <form action="/tests/{{ test.id }}/delete" method="post">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Удалить</button>
                            </form>
                        </td>
                    </tr>
                {% else %}
                    <tr><td colspan="5" class="text-secondary">Тестов пока нет.</td></tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
