{% extends "base.html" %}
{% block title %}{% if group %}Редактировать группу{% else %}Создать группу{% endif %}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h3 mb-1">{% if group %}Редактировать группу{% else %}Создать группу{% endif %}</h1>
        <p class="text-secondary mb-0">Название, описание и состав участников.</p>
    </div>
    <a class="btn btn-outline-dark" href="{% if group %}/groups/{{ group.id }}{% else %}/groups{% endif %}">Назад</a>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body">
        <form action="{% if group %}/groups/{{ group.id }}{% else %}/groups{% endif %}" method="post" class="d-grid gap-3">
            <div>
                <label class="form-label">Название</label>
                <input class="form-control" type="text" name="title" value="{{ group.title if group else '' }}" required>
            </div>
            <div>
                <label class="form-label">Описание</label>
                <textarea class="form-control" rows="3" name="description">{{ group.description if group else '' }}</textarea>
            </div>
            <div>
                <label class="form-label">Участники</label>
                <select class="form-select" name="members" multiple size="12">
                    {% for user in all_users %}
                        <option value="{{ user.id }}" {% if group and user.id in group.members %}selected{% endif %}>
                            {{ user.full_name or user.username }} · {{ user.email }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <button class="btn btn-dark" type="submit">{% if group %}Сохранить группу{% else %}Создать группу{% endif %}</button>
        </form>
    </div>
</div>
{% endblock %}
