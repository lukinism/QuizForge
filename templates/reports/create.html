{% extends "base.html" %}
{% block title %}Создать отчет{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h3 mb-1">Создать отчет</h1>
        <div class="text-muted">Выберите тип, фильтры и состав PDF</div>
    </div>
    <a class="btn btn-outline-secondary" href="/reports">К списку</a>
</div>

{% if error %}
    <div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" action="/reports/create" class="card shadow-sm">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Тип отчета</label>
                <select class="form-select" name="report_type" required>
                    <option value="test">По тесту</option>
                    <option value="user">По пользователю</option>
                    <option value="group">По группе</option>
                    <option value="date">По дате</option>
                    <option value="private_link">По приватной ссылке</option>
                    <option value="errors">По ошибкам</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Тест</label>
                <select class="form-select" name="test_id">
                    <option value="">Все</option>
                    {% for test in tests %}
                        <option value="{{ test.id }}">{{ test.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Группа</label>
                <select class="form-select" name="group_id">
                    <option value="">Все</option>
                    {% for group in groups %}
                        <option value="{{ group.id }}">{{ group.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Пользователь</label>
                <select class="form-select" name="user_id">
                    <option value="">Все</option>
                    {% for user in users %}
                        <option value="{{ user.id }}">{{ user.full_name or user.username }} · {{ user.email }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Приватная ссылка</label>
                <select class="form-select" name="private_link_id">
                    <option value="">Не выбрана</option>
                    {% for link in links %}
                        <option value="{{ link.id }}">{{ link.token[:8] }}... · {{ link.test_id }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Статус</label>
                <select class="form-select" name="status_filter">
                    <option value="">Все</option>
                    {% for status in status_choices if status %}
                        <option value="{{ status }}">{{ status }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Дата от</label>
                <input class="form-control" type="date" name="date_from">
            </div>
            <div class="col-md-4">
                <label class="form-label">Дата до</label>
                <input class="form-control" type="date" name="date_to">
            </div>
        </div>

        <hr class="my-4">

        <div class="row g-3">
            <div class="col-md-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="include_answers" value="true" id="include_answers">
                    <label class="form-check-label" for="include_answers">Включить ответы</label>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="include_correct_answers" value="true" id="include_correct_answers">
                    <label class="form-check-label" for="include_correct_answers">Включить правильные ответы</label>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="include_statistics" value="true" id="include_statistics" checked>
                    <label class="form-check-label" for="include_statistics">Включить статистику</label>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="include_charts" value="true" id="include_charts" checked>
                    <label class="form-check-label" for="include_charts">Включить диаграммы</label>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="include_signature" value="true" id="include_signature" checked>
                    <label class="form-check-label" for="include_signature">Включить подпись</label>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="include_qr" value="true" id="include_qr" checked>
                    <label class="form-check-label" for="include_qr">Добавить QR-код</label>
                </div>
            </div>
        </div>
    </div>
    <div class="card-footer bg-white text-end">
        <button class="btn btn-primary" type="submit">Сформировать PDF</button>
    </div>
</form>
{% endblock %}
